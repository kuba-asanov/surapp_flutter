name: Flutter CI

on: 
  pull_request:
  push:
    tags:
      - 'qa_android'  # Trigger only on "qa_android" tag push

jobs:
  danger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
      - name: Run Danger
        env:
          DANGER_GITHUB_API_TOKEN: ${{ secrets.DANGER_GITHUB_API_TOKEN }}
        run: tools/ci_cd_scripts/run_danger.sh

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up FVM
        run: |
          # Install FVM (correct URL)
          curl -fsSL https://raw.githubusercontent.com/leoafarias/fvm/main/install.sh | bash
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH  # Add FVM to the PATH
      - name: Install Flutter with FVM
        run: fvm install stable
      - name: Run Tests Script
        run: tools/ci_cd_scripts/run_tests.sh

  build_android_apk:
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref == 'refs/tags/qa_android'  # Only runs for the "qa_android" tag
    steps:
      - uses: actions/checkout@v2
      - name: Set up FVM
        run: |
          curl -sL https://pub.dev/install.sh | bash
          dart pub global activate fvm
      - name: Install Flutter with FVM
        run: fvm install stable
      - name: Run Android QA Build Script
        run: tools/ci_cd_scripts/build_android_apk.sh
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: qa-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
